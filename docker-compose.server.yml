services:
  app:
    image: pnet_solokha_danylo_app
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:5191
      - ConnectionStrings__DefaultConnection=Server=db;Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True
      - SEQ_URL=http://seq:5341
      - DATA_PROTECTION_KEY_DIR=/dp_keys
    ports:
      - "5191:5191"
    volumes:
      - dp_keys:/dp_keys
    depends_on:
      db:
        condition: service_healthy
      seq:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    env_file: .env
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - server_sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${DB_USER} -P ${DB_PASSWORD} -Q 'SELECT 1' -b -C"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_PASSWORD}
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  server_sql_data:
  seq_data:
  dp_keys:
