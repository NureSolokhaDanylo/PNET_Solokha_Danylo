global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'aspnetcore'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:5191']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
